version: "3.9"

services:

  postgres:

    image: postgres:17

    container_name: password-db

    restart: unless-stopped

    environment:

      POSTGRES_DB: ${DB_NAME}

      POSTGRES_USER: ${DB_USER}

      POSTGRES_PASSWORD: ${DB_PASSWORD}

    ports:

      - "5432:5432"

    volumes:

      - postgres-data:/var/lib/postgresql/data

      - ./migrations:/docker-entrypoint-initdb.d

volumes:

  postgres-data: